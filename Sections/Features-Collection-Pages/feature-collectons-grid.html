<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Collection</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      margin: 0;
    }

    /* SECTION */

    .fragrance-section {
      padding: 60px 20px;
    }

    .page-width {
      max-width: 1200px;
      margin: auto;
    }

    .section-title {
      font-size: 34px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    .section-title span {
      color: #f07d32;
    }

    /* GRID */

    .fragrance-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
    }

    /* CARD */

    .fragrance-card {
      background: #f7f7f7;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
    }

    /* IMAGE */

    .product-media {
      width: 100%;
      aspect-ratio: 1/1;
      overflow: hidden;
    }

    .product-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .6s ease;
    }

    /* IMAGE ZOOM */

    .fragrance-card:hover .product-media img {
      transform: scale(1.1);
    }

    /* INFO */

    .product-info {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #efefef;
    }

    /* TEXT */

    .product-title {
      font-size: 20px;
      margin: 0;
      position: relative;
      display: inline-block;
    }

    /* UNDERLINE */

    .product-title::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0%;
      height: 2px;
      background: #000;
      transition: width .35s ease;
    }

    .fragrance-card:hover .product-title::after {
      width: 100%;
    }

    .product-description {
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }

    /* ARROW */

    .arrow {
      font-size: 20px;
      transform: rotate(45deg);
      transition: transform .35s ease;
    }

    .fragrance-card:hover .arrow {
      transform: rotate(0deg);
    }

    /* TABLET */

    @media(max-width:900px) {

      .fragrance-section {
        padding: 50px 18px;
      }

      .fragrance-grid {
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .section-title {
        font-size: 30px;
      }

    }

    /* MOBILE */

    @media(max-width:600px) {

      .fragrance-section {
        padding: 40px 16px;
      }

      .fragrance-grid {
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .section-title {
        font-size: 24px;
        margin-bottom: 20px;
      }

      .product-info {
        padding: 14px 2px;
      }

      .product-title {
        font-size: 15px;
      }

      .product-description {
        font-size: 11px;
      }

      .arrow {
        font-size: 16px;
      }

    }
  </style>
</head>

<body>

  <section class="fragrance-section">

    <div class="page-width">

      <h2 class="section-title">OUR <span>FRAGRANCES</span></h2>

      <div class="fragrance-grid">

        <a href="#" class="fragrance-card">

          <div class="product-media">
            <img src="https://myop.in/cdn/shop/files/fresh_1.webp?v=1714048533&width=1080">
          </div>

          <div class="product-info">

            <div>
              <h3 class="product-title">FRESH</h3>
              <p class="product-description">
                Energize. Vitalize. Awaken.
              </p>
            </div>

            <div class="arrow">→</div>

          </div>

        </a>

        <a href="#" class="fragrance-card">

          <div class="product-media">
            <img src="https://myop.in/cdn/shop/files/woody__oriental_1.webp?v=1714048563&width=1080">
          </div>

          <div class="product-info">

            <div>
              <h3 class="product-title">ORIENTAL / WOODY</h3>
              <p class="product-description">
                Exotic. Sensual. Subtle.
              </p>
            </div>

            <div class="arrow">→</div>

          </div>

        </a>

        <a href="#" class="fragrance-card">

          <div class="product-media">
            <img src="https://myop.in/cdn/shop/files/floral_1.webp?v=1714048608&width=1080">
          </div>

          <div class="product-info">

            <div>
              <h3 class="product-title">FLORAL</h3>
              <p class="product-description">
                Fruity. Bloom. Candylicious.
              </p>
            </div>

            <div class="arrow">→</div>

          </div>

        </a>

      </div>
    </div>
  </section>

</body>

</html>
